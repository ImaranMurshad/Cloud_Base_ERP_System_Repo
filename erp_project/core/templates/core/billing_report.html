{% extends 'core/dashboard_base.html' %}

{% block content %}

<h2>Billing Report</h2>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="card p-3">
            <h5>Total Revenue</h5>
            <h3>₹ {{ total_revenue }}</h3>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3">
            <h5>Total Invoices</h5>
            <h3>{{ total_invoices }}</h3>
        </div>
    </div>
</div>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Total</th>
    </tr>

    {% for i in invoices %}
    <tr>
        <td>{{ i.id }}</td>
        <td>{{ i.customer.name }}</td>
        <td>{{ i.total_amount }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
