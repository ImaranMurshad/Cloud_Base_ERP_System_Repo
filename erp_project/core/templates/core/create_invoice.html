{% extends 'core/dashboard_base.html' %}

{% block content %}

<h2>Create Invoice</h2>

<form method="POST">
    {% csrf_token %}

    <!-- CUSTOMER -->
    <label>Select Customer</label>
    <select name="customer" class="form-control mb-3">
        <option value="">-- Select --</option>
        {% for c in customers %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
        <option value="new">+ Add New Customer</option>
    </select>

    <!-- NEW CUSTOMER -->
    <div class="border p-3 mb-3">
        <h5>New Customer (if selected)</h5>
        <input type="text" name="cust_name" placeholder="Name" class="form-control mb-1">
        <input type="email" name="cust_email" placeholder="Email" class="form-control mb-1">
        <input type="text" name="cust_phone" placeholder="Phone" class="form-control mb-1">
        <textarea name="cust_address" placeholder="Address" class="form-control mb-1"></textarea>
    </div>

    <!-- PRODUCTS -->
    <h5>Products</h5>

    <table class="table table-bordered" id="product-table">
        <thead>
            <tr>
                <th>Product</th>
                <th width="120">Price</th>
                <th width="120">Qty</th>
                <th width="120">Subtotal</th>
                <th width="80">Action</th>
            </tr>
        </thead>

        <tbody id="product-body">
            <tr>
                <td>
                    <select name="product" class="form-control" onchange="updatePrice(this)">
                        {% for p in products %}
                        <option value="{{ p.id }}" data-price="{{ p.price }}">
                            {{ p.name }}
                        </option>
                        {% endfor %}
                    </select>
                </td>

                <td>
                    <input type="number" class="form-control price" readonly>
                </td>

                <td>
                    <input type="number" name="quantity" class="form-control qty" oninput="calculateRow(this)">
                </td>

                <td>
                    <input type="number" class="form-control subtotal" readonly>
                </td>

                <td>
                    <button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button>
                </td>
            </tr>
        </tbody>
    </table>

    <button type="button" onclick="addRow()" class="btn btn-secondary mb-3">
        + Add More Products
    </button>

    <!-- TOTAL -->
    <div class="text-end">
        <h4>Total:  <span id="total">0</span></h4>
    </div>

    <button class="btn btn-dark mt-3">Save Invoice</button>

</form>

<!-- JS -->
<script>

// Set initial price
window.onload = function() {
    document.querySelectorAll("select[name='product']").forEach(updatePrice);
};

// Update price when product changes
function updatePrice(select) {
    let price = select.options[select.selectedIndex].dataset.price;
    let row = select.closest("tr");

    row.querySelector(".price").value = price;
    calculateRow(row.querySelector(".qty"));
}

// Calculate row subtotal
function calculateRow(input) {
    let row = input.closest("tr");
    let price = parseFloat(row.querySelector(".price").value) || 0;
    let qty = parseFloat(input.value) || 0;

    let subtotal = price * qty;
    row.querySelector(".subtotal").value = subtotal;

    calculateTotal();
}

// Calculate total
function calculateTotal() {
    let total = 0;

    document.querySelectorAll(".subtotal").forEach(function(el) {
        total += parseFloat(el.value) || 0;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

// Add new row
function addRow() {
    let row = document.querySelector("#product-body tr").cloneNode(true);

    row.querySelectorAll("input").forEach(input => input.value = "");
    document.getElementById("product-body").appendChild(row);
}

// Remove row
function removeRow(btn) {
    let rows = document.querySelectorAll("#product-body tr");

    if (rows.length > 1) {
        btn.closest("tr").remove();
        calculateTotal();
    } else {
        alert("At least one product is required");
    }
}

</script>

{% endblock %}
