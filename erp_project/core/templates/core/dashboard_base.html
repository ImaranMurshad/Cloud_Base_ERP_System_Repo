<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Cloud ERP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #adb5bd;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .submenu {
            padding-left: 20px;
            font-size: 14px;
            display: none;
        }

        .submenu a {
            padding: 8px 20px;
        }

        .content {
            padding: 20px;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .topbar {
            background: #212529;
            color: white;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">☁ Cloud ERP</h4>

            <a href="/dashboard/">🏠 Dashboard</a>
            <a href="/products/">📦 Item Master</a>
            <a href="/customers/">👤 Customer Master</a>
            <a href="/invoice/create/">➕ Create Invoice</a>
            <a href="/invoice/list/">📄 Invoice List</a>

            <!-- IMPORT EXPORT DROPDOWN -->
            <a href="#" onclick="toggleMenu()">
                📁 Import / Export <span id="arrow">▼</span>
            </a>

            <div id="submenu" class="submenu">
                <a href="/backup/export/">⬇ Export Backup</a>
                <a href="/backup/import/">📂 Import Backup</a>
            </div>

            <hr>
            <a href="/logout/" class="text-danger">🚪 Logout</a>
        </div>

        <!-- MAIN AREA -->
        <div class="col-md-10">

            <!-- TOPBAR -->
            <div class="topbar d-flex justify-content-between">
                <span>Welcome, {{ request.user.username }}</span>
                <!--<span>Cloud ERP Dashboard</span>-->
            </div>

            <!-- CONTENT -->
            <div class="content">
                {% block content %}
                {% endblock %}
            </div>

        </div>

    </div>
</div>

<!-- ✅ JAVASCRIPT FIXED -->
<script>
function toggleMenu() {
    let menu = document.getElementById("submenu");
    let arrow = document.getElementById("arrow");

    if (menu.style.display === "block") {
        menu.style.display = "none";
        arrow.innerHTML = "▼";
    } else {
        menu.style.display = "block";
        arrow.innerHTML = "▲";
    }
}
</script>

</body>
</html>
