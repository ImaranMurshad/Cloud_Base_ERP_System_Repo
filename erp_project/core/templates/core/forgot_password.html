{% extends 'core/base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow p-4">
            <h3 class="text-center mb-3">Forgot Password</h3>

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
                <input type="email" name="email" placeholder="Registered Email" class="form-control mb-2" required>

                 <select name="question" class="form-control mb-2" required>
    <option value="">-- Select Security Question --</option>
    <option value="What is your pet's name?">What is your pet's name?</option>
    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
    <option value="What was your first school?">What was your first school?</option>
    <option value="What is your favorite food?">What is your favorite food?</option>
    <option value="What city were you born in?">What city were you born in?</option>
</select>

                <!-- ✅ ANSWER FIELD (YOU MISSED THIS) -->
                <input type="text" name="answer" placeholder="Your Answer" class="form-control mb-2" required>

                <!-- ✅ SHOW PASSWORD ONLY AFTER VALIDATION -->
                {% if show_password %}
                <input type="password" name="new_password" placeholder="New Password" class="form-control mb-2" required>
                {% endif %}

                <button class="btn btn-dark w-100">
                    {% if show_password %} Reset Password {% else %} Verify {% endif %}
                </button>
            </form>

            <p class="text-danger mt-2">{{ error }}</p>
            <p class="text-success mt-2">{{ success }}</p>

        </div>

    </div>
</div>

{% endblock %}
